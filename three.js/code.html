<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
    }
  </style>
</head>
<body>
<!-- STITCH_THREEJS_START:ANIMATION_24 class="fixed inset-0 w-full h-full bg-transparent" -->
<div class="fixed inset-0 w-full h-full bg-transparent" style="display:block;">
<script src="https://ajax.googleapis.com/ajax/libs/threejs/r125/three.min.js"></script>
<div id="threejs-container-ANIMATION_24" style="width:100%;height:100%"></div>
<script>
(function() {
  const container = document.getElementById('threejs-container-ANIMATION_24');
  const devicePixelRatio = window.devicePixelRatio || 1;
  <script>
// Ambient "literary dust" particles for a sophisticated atmosphere
const canvas = document.createElement('canvas');
canvas.className = 'absolute inset-0 pointer-events-none opacity-40';
container.appendChild(canvas);
const ctx = canvas.getContext('2d');

let particles = [];
const particleCount = 40;

function init() {
    canvas.width = container.clientWidth || window.innerWidth;
    canvas.height = container.clientHeight || window.innerHeight;
    particles = [];
    for (let i = 0; i < particleCount; i++) {
        particles.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            size: Math.random() * 2 + 0.5,
            speedX: (Math.random() - 0.5) * 0.3,
            speedY: (Math.random() - 0.5) * 0.3,
            opacity: Math.random() * 0.5 + 0.2
        });
    }
}

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles.forEach(p => {
        p.x += p.x > canvas.width ? -canvas.width : (p.x < 0 ? canvas.width : p.speedX);
        p.y += p.y > canvas.height ? -canvas.height : (p.y < 0 ? canvas.height : p.speedY);
        
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(26, 26, 26, ${p.opacity})`;
        ctx.fill();
    });
    requestAnimationFrame(animate);
}

window.addEventListener('resize', init);
init();
animate();
</script>
})();

</div>
<!-- STITCH_THREEJS_END:ANIMATION_24 -->
</body>
</html>
